<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="tech-bento：每日英文科技新聞中文摘要，精選 Top 5。"
    />
    <script>
      let theme = "dark";
      try {
        theme = globalThis.localStorage?.getItem("tech-bento-theme") === "light" ? "light" : "dark";
      } catch {
        theme = "dark";
      }
      document.documentElement.dataset.theme = theme;
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
